<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Mock proveedor</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; }
      #v { width: 100%; height: 100%; object-fit: cover; background: #1d2a12; }
    </style>
  </head>
  <body>
    <!-- Sin media real: el elemento <video> basta para que el content script
         detecte el reproductor y monte los botones / arme el fullscreen. Para
         pruebas de velocidad/auto-skip se necesitaría un video con duración. -->
    <video id="v" width="760" height="430" muted playsinline></video>
    <!-- Botón de fullscreen tipo player HTML5 (lo detecta findProviderFsButton). -->
    <button class="vjs-fullscreen-control" aria-label="Fullscreen">⛶</button>
  </body>
</html>
